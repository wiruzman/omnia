name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test and build
    runs-on: macos-latest
    env:
      CGO_ENABLED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build commands
        run: |
          go build -o "${RUNNER_TEMP}/omnia" ./cmd/omnia
          go build -o "${RUNNER_TEMP}/omnia-daemon" ./cmd/omnia-daemon
          go build -o "${RUNNER_TEMP}/omnia-bench" ./cmd/bench
